{% extends 'base.html' %}

{% block titulo %}{{ titulo }} - Arca Proteção{% endblock %}

{% block conteudo %}
<div class="card">
    <div class="card-body">
        <h1 class="h4 mb-3">{{ titulo }}</h1>
        <p>{{ mensagem }}</p>
        <form method="post" class="d-flex gap-2">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Confirmar exclusão</button>
            <a href="{% url url_voltar %}" class="btn btn-secondary">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
