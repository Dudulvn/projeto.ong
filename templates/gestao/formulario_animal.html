{% extends 'base.html' %}

{% block titulo %}{{ titulo }} - Arca Proteção{% endblock %}

{% block conteudo %}
<div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
    <h1 class="mb-0">{{ titulo }}</h1>
    <a href="{% url 'listar_animais' %}" class="btn btn-outline-secondary">Voltar</a>
</div>

<div class="card">
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {% for campo in formulario %}
                <div class="mb-3">
                    <label class="form-label" for="{{ campo.id_for_label }}">{{ campo.label }}</label>
                    {{ campo }}
                    {% if campo.errors %}
                        <div class="text-danger small">{{ campo.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <button type="submit" class="btn btn-success">Salvar</button>
        </form>
    </div>
</div>
{% endblock %}
